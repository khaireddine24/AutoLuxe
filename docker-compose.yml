# Production-ready multi-service setup:
# - `db`: Postgres (persistent)
# - `backend`: Django + DRF (gunicorn) + migrations/collectstatic on startup
# - `frontend`: React (CRA) served by nginx
#
# Start with: `docker compose --env-file .env up --build -d`

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # Django
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}

      # CORS + frontend redirect url
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}

      # SSLCommerz credentials (used by payment integration)
      SSL_STORE_ID: ${SSL_STORE_ID}
      SSL_API_KEY: ${SSL_API_KEY}

      # Database (Postgres)
      USE_POSTGRES: ${USE_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - media_data:/app/backend/media
    ports:
      - ${BACKEND_PORT}:8000

  frontend:
    build:
      context: .
      target: frontend
      args:
        # CRA bake-time variable for API base url
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - ${FRONTEND_PORT}:8080

volumes:
  db_data:
  media_data:

